services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    init: true
    restart: unless-stopped
    env_file: .env
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kitchen:${DB_PASSWORD}@postgres:5432/kitchen_app
      NODE_ENV: production
      TZ: Asia/Tokyo
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    stop_grace_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - kitchen-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    init: true
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - kitchen-net

  discord-bot:
    build:
      context: .
      dockerfile: apps/discord-bot/Dockerfile
    init: true
    restart: unless-stopped
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Tokyo
      KITCHEN_API_BASE_URL: http://api:3001
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - kitchen-net

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    init: true
    restart: unless-stopped
    env_file: .env
    expose:
      - "3002"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kitchen:${DB_PASSWORD}@postgres:5432/kitchen_app
      NODE_ENV: production
      TZ: Asia/Tokyo
      MCP_PORT: "3002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 15s
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - kitchen-net

  postgres:
    image: postgres:17-alpine
    init: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: kitchen_app
      POSTGRES_USER: kitchen
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchen -d kitchen_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    stop_grace_period: 60s
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - kitchen-net

  nginx:
    image: nginx:alpine
    init: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - kitchen-net

volumes:
  pgdata:

networks:
  kitchen-net:
    driver: bridge
