version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kitchen:${DB_PASSWORD}@postgres:5432/kitchen_app
      NODE_ENV: production
      TZ: Asia/Tokyo
    networks:
      - kitchen-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - kitchen-net

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: kitchen_app
      POSTGRES_USER: kitchen
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchen -d kitchen_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kitchen-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - kitchen-net

volumes:
  pgdata:

networks:
  kitchen-net:
    driver: bridge
