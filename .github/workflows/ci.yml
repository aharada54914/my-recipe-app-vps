name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            env -u npm_config_http_proxy npm ci
          else
            echo "package-lock.json not found; generating lockfile via npm install"
            env -u npm_config_http_proxy npm install --package-lock
          fi

      - name: Lint
        run: env -u npm_config_http_proxy npm run lint

      - name: Test
        run: env -u npm_config_http_proxy npm test

      - name: Build
        run: env -u npm_config_http_proxy npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
