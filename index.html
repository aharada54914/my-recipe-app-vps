<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/pwa-192x192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <meta name="description" content="Kitchen App — ホットクック・ヘルシオ対応レシピ管理PWA" />
  <meta name="theme-color" content="#F5EFE6" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script>
    (() => {
      const storageKey = 'appearance_mode_v1';
      const rawMode = (() => {
        try {
          return window.localStorage.getItem(storageKey);
        } catch {
          return null;
        }
      })();
      const mode = rawMode === 'light' || rawMode === 'dark' || rawMode === 'system' ? rawMode : 'system';
      const prefersDark = typeof window.matchMedia === 'function'
        && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const resolved = mode === 'system' ? (prefersDark ? 'dark' : 'light') : mode;
      const themeColor = resolved === 'dark' ? '#191613' : '#F5EFE6';

      document.documentElement.dataset.theme = resolved;
      document.documentElement.style.colorScheme = resolved;
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) {
        themeMeta.setAttribute('content', themeColor);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <title>Kitchen App</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
